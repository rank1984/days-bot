name: DAYS-BOT

on:
  schedule:
    # 14:30 ישראל = 11:30 UTC — שעתיים לפני פתיחת השוק
    - cron: "30 11 * * 1-5"   # 14:30 ישראל — לפני פתיחה
    - cron: "0 20 * * 1-5"    # 23:00 ישראל — סריקת לילה לחדשות
  workflow_dispatch:
    inputs:
      mode:
        description: "universe | alerts | full"
        required: false
        default: "full"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore database
        uses: actions/cache@v4
        with:
          path: database/database.db
          key: days-bot-db-${{ github.run_id }}
          restore-keys: |
            days-bot-db-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DAYS-BOT
        run: python main.py full
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          POLYGON_API_KEY:   ${{ secrets.POLYGON_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
          FMP_API_KEY:       ${{ secrets.FMP_API_KEY }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save database
        if: always()
        uses: actions/cache/save@v4
        with:
          path: database/database.db
          key: days-bot-db-${{ github.run_id }}
